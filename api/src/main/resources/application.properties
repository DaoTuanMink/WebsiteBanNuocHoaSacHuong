spring.application.name=api

# Cấu hình cổng chạy ứng dụng (mặc định là 8080)
server.port=8080

# Cấu hình kết nối MySQL (Thay 'perfume_shop' bằng tên DB bạn tạo trong Workbench)
spring.datasource.url=jdbc:mysql://localhost:3306/perfume_shop?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456

# Cấu hình Hibernate tự động tạo/cập nhật bảng từ code Java
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
